server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**
      httpclient:
        connect-timeout: 5000   # ms
        response-timeout: 5s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET}
  services:
    auth-url: ${AUTH_SERVICE_URL:http://localhost:8081}
  rate-limit:
    max-requests: 60
    window-seconds: 60
