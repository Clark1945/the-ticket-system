version: '3.8'

# ELK Stack for API Gateway log monitoring
# Usage:
#   Start:  docker compose -f docker-compose.elk.yml up -d
#   Stop:   docker compose -f docker-compose.elk.yml down
#   Kibana: http://localhost:5601
#
# Prerequisites:
#   - API Gateway must be running and writing to api-gateway/logs/api-calls.log
#   - On Linux/WSL: run `sysctl -w vm.max_map_count=262144` (Elasticsearch requirement)

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elk-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false        # disable auth for local dev
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m     # limit memory for local dev
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - elk

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: elk-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - elk

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: elk-filebeat
    user: root                              # needed to read log files
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./api-gateway/logs:/logs/api-gateway:ro   # mount Gateway log directory
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk
    command: filebeat -e -strict.perms=false

volumes:
  elasticsearch_data:

networks:
  elk:
    driver: bridge
