<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{merchant.login.title}">Merchant Login - Ticket System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 2rem; width: 100%; max-width: 420px; }
        h1 { font-size: 1.6rem; margin-bottom: 1.5rem; color: #333; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.9rem; font-weight: 600; color: #555; margin-bottom: 0.3rem; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;
        }
        input:focus { outline: none; border-color: #4a90e2; box-shadow: 0 0 0 2px rgba(74,144,226,0.2); }
        button[type="submit"] {
            width: 100%; padding: 0.75rem; background: #4a90e2; color: #fff; border: none;
            border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem;
        }
        button[type="submit"]:hover { background: #357abd; }
        .alert-error   { background: #fdecea; color: #c62828; border: 1px solid #f5c6c6; border-radius: 4px; padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.9rem; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; border-radius: 4px; padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.9rem; }
        .footer-link { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #666; }
        .footer-link a { color: #4a90e2; text-decoration: none; }
        .logo { display: block; margin: 0 auto 1.2rem; width: 40%; height: 20%; object-fit: contain; }
        .lang-switcher { text-align: center; margin-bottom: 1.2rem; font-size: 0.82rem; }
        .lang-switcher a { color: #4a90e2; text-decoration: none; margin: 0 0.3rem; }
        .lang-switcher a:hover { text-decoration: underline; }
        .lang-switcher span { color: #bbb; margin: 0 0.15rem; }
    </style>
</head>
<body>
<div class="card">
    <img class="logo" th:src="@{/images/icon.png}" alt="Logo" />
    <h1 th:text="#{merchant.login.heading}">Merchant Portal</h1>

    <div class="lang-switcher">
        <a th:href="@{/app/merchant/login(lang=en)}"   th:text="#{common.lang.en}">English</a>
        <span>|</span>
        <a th:href="@{/app/merchant/login(lang=zh_TW)}" th:text="#{common.lang.zh_TW}">繁體中文</a>
        <span>|</span>
        <a th:href="@{/app/merchant/login(lang=ja)}"   th:text="#{common.lang.ja}">日本語</a>
    </div>

    <div class="alert-success" th:if="${param.registered}" th:text="#{merchant.login.registered}"></div>
    <div class="alert-error"   th:if="${error}"            th:text="${error}"></div>
    <div class="alert-error"   th:if="${param.error}"      th:text="#{merchant.login.error.invalid}"></div>

    <form th:action="@{/app/merchant/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label for="email" th:text="#{merchant.login.email}">Email Address</label>
            <input type="email" id="email" name="email"
                   th:placeholder="#{merchant.login.email.placeholder}" required autofocus />
        </div>

        <div class="form-group">
            <label for="password" th:text="#{merchant.login.password}">Password</label>
            <input type="password" id="password" name="password"
                   th:placeholder="#{merchant.login.password.placeholder}" required />
        </div>

        <button type="submit" th:text="#{merchant.login.submit}">Sign In</button>
    </form>

    <div class="footer-link">
        <span th:text="#{merchant.login.no.account}">New merchant?</span>
        <a href="/app/merchant/register" th:text="#{merchant.login.create.account}">Create an account</a>
    </div>
</div>
</body>
</html>
