<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Unavailable - Ticket System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 3rem 2rem; width: 100%; max-width: 480px; text-align: center; }
        .status-code { font-size: 5rem; font-weight: 700; color: #8e24aa; line-height: 1; }
        h1 { font-size: 1.5rem; color: #333; margin: 0.75rem 0 0.5rem; }
        p  { color: #666; font-size: 0.95rem; margin-bottom: 1.5rem; }
        a  { display: inline-block; padding: 0.6rem 1.5rem; background: #4a90e2; color: #fff; border-radius: 4px; text-decoration: none; font-size: 0.95rem; }
        a:hover { background: #357abd; }
        .retry-note { font-size: 0.85rem; color: #999; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="status-code">503</div>
    <h1>Service Unavailable</h1>
    <p th:text="${message != null ? message : 'The service is temporarily unavailable. Please try again in a moment.'}">
        The service is temporarily unavailable. Please try again in a moment.
    </p>
    <a href="javascript:window.location.reload()">Try Again</a>
    <p class="retry-note">If the problem persists, please contact support.</p>
</div>
</body>
</html>
